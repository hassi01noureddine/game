<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<title>لعبة الأعداد للأطفال</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
  }

  h1 {
    color: #333;
  }

  #number {
    font-size: 60px;
    margin: 20px;
    color: #ff5722;
  }

  .balls {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin: 20px;
  }

  .ball {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #4caf50;
    margin: 10px;
    cursor: pointer;
  }

  .selected {
    background: #2196f3;
  }

  #box {
    width: 200px;
    height: 120px;
    border: 3px dashed #333;
    margin: 30px auto;
    line-height: 120px;
    font-size: 20px;
    background: #fff;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }

  #msg {
    font-size: 24px;
    margin-top: 20px;
  }
</style>
</head>

<body>

<h1>🎮 لعبة عدّ الكرات</h1>

<div id="number">5</div>

<div class="balls" id="balls"></div>

<div id="box">ضع الكرات هنا</div>

<button onclick="check()">تحقق</button>

<p id="msg"></p>

<script>
let target = 5;
let selected = 0;

// إنشاء الكرات
const ballsContainer = document.getElementById("balls");

for (let i = 0; i < 9; i++) {
  let ball = document.createElement("div");
  ball.classList.add("ball");

  ball.onclick = function () {
    if (ball.classList.contains("selected")) {
      ball.classList.remove("selected");
      selected--;
    } else {
      ball.classList.add("selected");
      selected++;
    }
  };

  ballsContainer.appendChild(ball);
}

// التحقق
function check() {
  if (selected === target) {
    document.getElementById("msg").innerHTML = "🎉 أحسنت!";
  } else {
    document.getElementById("msg").innerHTML = "❌ حاول مرة أخرى";
  }
}
</script>

</body>
</html>
