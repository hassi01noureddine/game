<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة عدّ الكرات الذكية</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(#e3f2fd, #ffffff);
}

h1 {
  color: #1976d2;
}

#number {
  font-size: 70px;
  margin: 20px;
  color: #ff5722;
  font-weight: bold;
}

#score {
  font-size: 20px;
  margin: 10px;
}

.balls {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px;
}

.ball {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  margin: 10px;
  cursor: pointer;
  background: radial-gradient(circle at 30% 30%, #81c784, #2e7d32);
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  transition: 0.2s;
}

.ball:active {
  transform: scale(0.9);
}

.selected {
  background: radial-gradient(circle at 30% 30%, #64b5f6, #1565c0);
}

#box {
  width: 220px;
  height: 120px;
  border: 3px dashed #333;
  margin: 30px auto;
  line-height: 120px;
  font-size: 18px;
  background: #fff;
  border-radius: 10px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  cursor: pointer;
  border: none;
  background: #1976d2;
  color: white;
  border-radius: 8px;
  margin: 10px;
}

button:hover {
  background: #0d47a1;
}

#msg {
  font-size: 24px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎮 لعبة عدّ الكرات الذكية</h1>

<div id="score">⭐ النقاط: 0</div>

<div id="number">3</div>

<div class="balls" id="balls"></div>

<div id="box">ضع الكرات هنا</div>

<button onclick="check()">تحقق</button>
<button onclick="nextLevel()">المستوى التالي</button>

<p id="msg"></p>

<audio id="soundGood">
  <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" type="audio/ogg">
</audio>

<audio id="soundBad">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>

<script>
let target = 3;
let selected = 0;
let score = 0;

// إنشاء الكرات
const ballsContainer = document.getElementById("balls");

function createBalls() {
  ballsContainer.innerHTML = "";
  selected = 0;

  for (let i = 0; i < 9; i++) {
    let ball = document.createElement("div");
    ball.classList.add("ball");

    ball.onclick = function () {
      if (ball.classList.contains("selected")) {
        ball.classList.remove("selected");
        selected--;
      } else {
        ball.classList.add("selected");
        selected++;
      }
    };

    ballsContainer.appendChild(ball);
  }
}

createBalls();

// التحقق
function check() {
  let good = document.getElementById("soundGood");
  let bad = document.getElementById("soundBad");

  if (selected === target) {
    document.getElementById("msg").innerHTML = "🎉 ممتاز!";
    score += 10;
    document.getElementById("score").innerHTML = "⭐ النقاط: " + score;
    good.play();
  } else {
    document.getElementById("msg").innerHTML = "❌ حاول مرة أخرى";
    bad.play();
  }
}

// مستوى جديد
function nextLevel() {
  target = Math.floor(Math.random() * 9) + 1;
  document.getElementById("number").innerHTML = target;
  document.getElementById("msg").innerHTML = "";
  createBalls();
}
</script>

</body>
</html>
